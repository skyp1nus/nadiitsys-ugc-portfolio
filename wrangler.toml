name = "nadiitsys"
main = ".open-next/worker.js"
compatibility_date = "2026-04-01"
compatibility_flags = ["nodejs_compat", "global_fetch_strictly_public"]

[assets]
directory = ".open-next/assets"
binding = "ASSETS"

[[services]]
binding = "WORKER_SELF_REFERENCE"
service = "nadiitsys"

[[d1_databases]]
binding = "DB"
database_name = "nadiitsys"
database_id = "a3d23bab-6cc7-4314-b624-9ec031040e99"

[[r2_buckets]]
binding = "MEDIA"
bucket_name = "nadiitsys-media"
