name: Deploy

on:
  push:
    branches: [main]

concurrency:
  group: deploy
  cancel-in-progress: true

permissions:
  contents: read
  deployments: write

jobs:
  lint-and-typecheck:
    name: Lint & type-check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Materialize wrangler.toml
        env:
          D1_DATABASE_ID: ${{ secrets.CF_D1_DATABASE_ID }}
          KV_RATE_LIMIT_ID: ${{ secrets.CF_KV_RATE_LIMIT_ID }}
        run: |
          sed \
            -e "s|YOUR_D1_DATABASE_ID|${D1_DATABASE_ID}|" \
            -e "s|YOUR_KV_NAMESPACE_ID|${KV_RATE_LIMIT_ID}|" \
            wrangler.toml.example > wrangler.toml

      - name: Generate worker types
        run: bunx wrangler types

      - name: Lint
        run: bun run lint

      - name: Type-check
        run: bunx tsc --noEmit

  deploy:
    name: Build & deploy
    needs: lint-and-typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Materialize wrangler.toml
        env:
          D1_DATABASE_ID: ${{ secrets.CF_D1_DATABASE_ID }}
          KV_RATE_LIMIT_ID: ${{ secrets.CF_KV_RATE_LIMIT_ID }}
        run: |
          sed \
            -e "s|YOUR_D1_DATABASE_ID|${D1_DATABASE_ID}|" \
            -e "s|YOUR_KV_NAMESPACE_ID|${KV_RATE_LIMIT_ID}|" \
            wrangler.toml.example > wrangler.toml

      - name: Generate worker types
        run: bunx wrangler types

      - name: Build for Cloudflare
        run: bunx opennextjs-cloudflare build

      - name: Deploy via wrangler
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: deploy
